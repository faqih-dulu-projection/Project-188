<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat Room</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121213;
            color: #e1e1e1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tampilan 1: Landing Page / Tombol Pintasan */
        .landing-container {
            background: #1e1e1f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .landing-container h1 {
            color: #4f46e5;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #3f3f46;
            border-radius: 8px;
            background: #27272a;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .input-group input:focus {
            border-color: #4f46e5;
        }

        .btn-shortcut {
            display: inline-block;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-shortcut:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        /* Tampilan 2: Ruang Chat */
        .chat-container {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: #1e1e1f;
            border-radius: 12px;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* PERBAIKAN DI SINI: Pake flexbox biar sejajar dan gak tabrakan */
        .chat-header {
            background: #27272a;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3f3f46;
        }

        #chatHeaderTitle {
            font-weight: bold;
            color: #a78bfa;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        /* Tombol Ganti Nama (Udah gak absolute lagi) */
        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            flex-shrink: 0; /* Menolak ciut biar tulisan tombol tetep jelas */
            transition: background 0.2s;
        }
        .btn-logout:hover { background: #dc2626; }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-box {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Chat dari diri sendiri */
        .msg-me {
            background: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 1px;
        }

        /* Chat dari orang lain */
        .msg-other {
            background: #27272a;
            color: #e1e1e1;
            align-self: flex-start;
            border-bottom-left-radius: 1px;
        }

        .msg-sender {
            font-size: 11px;
            color: #a1a1aa;
            margin-bottom: 4px;
            font-weight: bold;
            display: block;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #27272a;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #3f3f46;
            background: #121213;
            color: white;
            border-radius: 6px;
            outline: none;
        }

        .chat-input-area button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input-area button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

    <div class="landing-container" id="landingPage">
        <h1>GAME GLOBAL CHAT</h1>
        <p style="color: #a1a1aa; margin-bottom: 20px; font-size: 14px;">Silakan masukkan nama kamu untuk bergabung ke obrolan global.</p>
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="Masukkan nama kamu..." maxlength="15">
        </div>
        <button class="btn-shortcut" id="btnMasuk">MASUK CHAT GLOBAL 🚀</button>
    </div>

    <div class="chat-container" id="chatPage">
        <div class="chat-header">
            <div id="chatHeaderTitle">Global Room</div>
            <button class="btn-logout" id="btnGantiNama">Ganti Nama</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <form class="chat-input-area" id="chatForm">
            <input type="text" id="msgInput" placeholder="Ketik pesan di sini..." autocomplete="off" required>
            <button type="submit">Kirim</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdkLCzMWrn7X6nw6IXRXuqJODbYmrWx4",
            authDomain: "database-leatherboard-b4493.firebaseapp.com",
            databaseURL: "https://database-leatherboard-b4493-default-rtdb.firebaseio.com",
            projectId: "database-leatherboard-b4493",
            storageBucket: "database-leatherboard-b4493.firebasestorage.app",
            messagingSenderId: "866722823352",
            appId: "1:866722823352:web:6528fb878fac28746f484d",
            measurementId: "G-XF0P8Q9NHL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "global_chats");

        let namaUser = "";

        const landingPage = document.getElementById('landingPage');
        const chatPage = document.getElementById('chatPage');
        const usernameInput = document.getElementById('usernameInput');
        const btnMasuk = document.getElementById('btnMasuk');
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const msgInput = document.getElementById('msgInput');
        const chatHeaderTitle = document.getElementById('chatHeaderTitle');
        const btnGantiNama = document.getElementById('btnGantiNama');

        // ==== FITUR INGAT NAMA (AUTO LOGIN) ====
        const namaTersimpan = localStorage.getItem('globalChatUsername');
        
        if (namaTersimpan) {
            namaUser = namaTersimpan;
            bukaRoomChat();
        } else {
            landingPage.style.display = "block";
        }

        btnMasuk.addEventListener('click', () => {
            const inputNama = usernameInput.value.trim();
            if (inputNama === "") {
                alert("Nama tidak boleh kosong bro!");
                return;
            }

            namaUser = inputNama;
            localStorage.setItem('globalChatUsername', namaUser);
            bukaRoomChat();
        });

        function bukaRoomChat() {
            landingPage.style.display = "none";
            chatPage.style.display = "flex";
            chatHeaderTitle.innerText = `Global Room (${namaUser})`;
            chatHeaderTitle.title = `Global Room (${namaUser})`; // Tooltip pas kursor diarahkan ke nama
            loadMessages();
        }

        btnGantiNama.addEventListener('click', () => {
            const konfirmasi = confirm("Mau keluar dan ganti nickname baru?");
            if (konfirmasi) {
                localStorage.removeItem('globalChatUsername');
                location.reload();
            }
        });

        // Fungsi Mengirim Pesan
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const textText = msgInput.value.trim();
            if (textText === "") return;

            try {
                const newChatRef = push(chatRef);
                await set(newChatRef, {
                    sender: namaUser,
                    text: textText,
                    timestamp: serverTimestamp()
                });
                msgInput.value = "";
            } catch (error) {
                console.error("Gagal mengirim pesan: ", error);
            }
        });

        // Fungsi Memuat Pesan Live
        function loadMessages() {
            onValue(chatRef, (snapshot) => {
                chatMessages.innerHTML = "";
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const data = childSnapshot.val();
                        const msgDiv = document.createElement('div');
                        msgDiv.classList.add('msg-box');

                        if (data.sender === namaUser) {
                            msgDiv.classList.add('msg-me');
                            msgDiv.innerHTML = `<span class="msg-sender">Anda</span>${data.text}`;
                        } else {
                            msgDiv.classList.add('msg-other');
                            msgDiv.innerHTML = `<span class="msg-sender">${data.sender}</span>${data.text}`;
                        }
                        chatMessages.appendChild(msgDiv);
                    });
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            });
        }
    </script>
</body>
</html>
