<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat Room</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121213;
            color: #e1e1e1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tampilan 1: Landing Page / Tombol Pintasan */
        .landing-container {
            background: #1e1e1f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .landing-container h1 {
            color: #4f46e5;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #3f3f46;
            border-radius: 8px;
            background: #27272a;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .input-group input:focus {
            border-color: #4f46e5;
        }

        .btn-shortcut {
            display: inline-block;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-shortcut:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        /* Tampilan 2: Ruang Chat (Sembunyikan di awal) */
        .chat-container {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: #1e1e1f;
            border-radius: 12px;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: #27272a;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #3f3f46;
            color: #a78bfa;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-box {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Chat dari diri sendiri */
        .msg-me {
            background: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 1px;
        }

        /* Chat dari orang lain */
        .msg-other {
            background: #27272a;
            color: #e1e1e1;
            align-self: flex-start;
            border-bottom-left-radius: 1px;
        }

        .msg-sender {
            font-size: 11px;
            color: #a1a1aa;
            margin-bottom: 4px;
            font-weight: bold;
            display: block;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #27272a;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #3f3f46;
            background: #121213;
            color: white;
            border-radius: 6px;
            outline: none;
        }

        .chat-input-area button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input-area button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

    <div class="landing-container" id="landingPage">
        <h1>GAME GLOBAL CHAT</h1>
        <p style="color: #a1a1aa; margin-bottom: 20px; font-size: 14px;">Silakan masukkan nama kamu untuk bergabung ke obrolan global.</p>
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="Masukkan nama kamu..." maxlength="15">
        </div>
        <button class="btn-shortcut" id="btnMasuk">MASUK CHAT GLOBAL 🚀</button>
    </div>

    <div class="chat-container" id="chatPage">
        <div class="chat-header" id="chatHeaderTitle">Global Room</div>
        <div class="chat-messages" id="chatMessages">
            </div>
        <form class="chat-input-area" id="chatForm">
            <input type="text" id="msgInput" placeholder="Ketik pesan di sini..." autocomplete="off" required>
            <button type="submit">Kirim</button>
        </form>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCUdkLCzMWrn7X6nw6IXRXuqJODbYmrWx4",
  authDomain: "database-leatherboard-b4493.firebaseapp.com",
  databaseURL: "https://database-leatherboard-b4493-default-rtdb.firebaseio.com",
  projectId: "database-leatherboard-b4493",
  storageBucket: "database-leatherboard-b4493.firebasestorage.app",
  messagingSenderId: "866722823352",
  appId: "1:866722823352:web:6528fb878fac28746f484d",
  measurementId: "G-XF0P8Q9NHL"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        // Inisialisasi Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatCollection = collection(db, "global_chats");

        // Variabel Lokal
        let namaUser = "";

        // DOM Elements
        const landingPage = document.getElementById('landingPage');
        const chatPage = document.getElementById('chatPage');
        const usernameInput = document.getElementById('usernameInput');
        const btnMasuk = document.getElementById('btnMasuk');
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const msgInput = document.getElementById('msgInput');
        const chatHeaderTitle = document.getElementById('chatHeaderTitle');

        // Aksi ketika tombol pintasan ditekan
        btnMasuk.addEventListener('click', () => {
            namaUser = usernameInput.value.trim();
            if (namaUser === "") {
                alert("Nama tidak boleh kosong bro!");
                return;
            }

            // Pindah tampilan
            landingPage.style.display = "none";
            chatPage.style.display = "flex";
            chatHeaderTitle.innerText = `Global Room (Login sebagai: ${namaUser})`;

            // Mulai dengerin chat masuk secara Realtime
            loadMesseges();
        });

        // Fungsi Mengirim Chat ke Firebase
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const textText = msgInput.value.trim();
            if (textText === "") return;

            try {
                await addDoc(chatCollection, {
                    sender: namaUser,
                    text: textText,
                    timestamp: serverTimestamp()
                });
                msgInput.value = ""; // Kosongkan input setelah kirim
            } catch (error) {
                console.error("Gagal mengirim pesan: ", error);
            }
        });

        // Fungsi Memuat Chat Secara Realtime (OnSnapshot)
        function loadMesseges() {
            const q = query(chatCollection, orderBy("timestamp", "asc"));
            
            onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = ""; // Bersihkan layar lama
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if(!data.timestamp) return; // Lewati jika serverTimestamp belum kelar dimuat

                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('msg-box');

                    // Cek apa ini chat kita atau orang lain
                    if (data.sender === namaUser) {
                        msgDiv.classList.add('msg-me');
                        msgDiv.innerHTML = `<span class="msg-sender">Anda</span>${data.text}`;
                    } else {
                        msgDiv.classList.add('msg-other');
                        msgDiv.innerHTML = `<span class="msg-sender">${data.sender}</span>${data.text}`;
                    }

                    chatMessages.appendChild(msgDiv);
                });

                // Auto scroll ke chat paling bawah setiap ada pesan baru
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }
    </script>
</body>
</html>
