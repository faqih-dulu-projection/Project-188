<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Perpisahan - XP Hunt Token Secured</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }
        .container {
            background: #151f32;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #233554;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }
        
        /* AREA GAMEPLAY */
        .game-canvas-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            background-color: #05070c;
            background-image: url('koin-kaca.png');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            border: 1px solid #233554;
            overflow: hidden;
        }

        #xp-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        /* TARGET BOHLAM */
        .target-bulb {
            position: absolute;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, rgba(245,158,11,0.3) 0%, rgba(245,158,11,0) 70%);
            border: 2px solid #f59e0b;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            -webkit-tap-highlight-color: transparent;
            z-index: 2;
        }
        .target-bulb::after {
            content: "";
            width: 20px; height: 20px;
            background-color: #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 10px #f59e0b;
        }

        /* OVERLAY LOCK SCREEN */
        .lock-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 5; border-radius: 12px;
        }
        .timer-countdown {
            font-size: 1.8rem; color: #ef4444; font-weight: bold;
            margin-top: 10px; font-family: monospace;
        }

        /* PANEL INFO DI BAWAH */
        .bottom-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0b0f19;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #233554;
        }
        .info-block { text-align: left; }
        .info-label { font-size: 0.75rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 1.4rem; font-weight: bold; }
        #global-pool { color: #f59e0b; }
        #my-coins { color: #10b981; }

        input[type="text"] {
            width: 100%; padding: 12px; border: 1px solid #233554;
            border-radius: 8px; background-color: #0b0f19; color: #fff;
            font-size: 1rem; text-align: center; box-sizing: border-box;
            outline: none; margin-bottom: 8px;
        }
        input[type="text"]:focus { border-color: #f59e0b; }
        button {
            background-color: #f59e0b; color: #0b0f19; border: none; padding: 12px;
            font-size: 1rem; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
        }

        /* SCREEN BLANK HITAM TOTAL */
        #tamat-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; color: #ffffff;
            display: none; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; z-index: 9999; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="tamat-screen">kuota habis, besok undian hadiah</div>

<div class="container">
    <div class="game-canvas-wrapper" id="canvas-area">
        <canvas id="xp-canvas"></canvas>
        <div class="target-bulb" id="bulb-obj" onclick="tapBohlam()" style="display: none;"></div>
        
        <div id="lock-screen" class="lock-overlay" style="display: none;">
            <div id="lock-status-text" style="font-size: 1rem; color: #94a3b8; font-weight: bold;">GAME DIBUKA DALAM:</div>
            <div id="countdown-timer" class="timer-countdown">00:00:00</div>
        </div>
    </div>

    <div id="login-section">
        <input type="text" id="player-token" placeholder="Masukkan Token Anda">
        <button onclick="startEvent()">MASUK GAME</button>
    </div>

    <div id="score-section" class="bottom-panel" style="display: none;">
        <div class="info-block">
            <div class="info-label">Sisa Kuota Poin</div>
            <div id="global-pool" class="info-value">50.000</div>
        </div>
        <div class="info-block" style="text-align: right;">
            <div id="display-player-name" class="info-label">Poin Anda</div>
            <div id="my-coins" class="info-value">0</div>
        </div>
    </div>
</div>

<script>
// ==========================================
// KONFIGURASI FIREBASE (GANTI PAKAI DATA LU)
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "perpisahan-kelas.firebaseapp.com",
    databaseURL: "https://perpisahan-kelas-default-rtdb.firebaseio.com",
    projectId: "perpisahan-kelas",
    storageBucket: "perpisahan-kelas.appspot.com",
    messagingSenderId: "...",
    appId: "..."
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPlayer = ""; // Menyimpan nama asli hasil deteksi token
let sisaPoinGlobal = 50000;
const MAX_POOL = 50000;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const canvas = document.getElementById("xp-canvas");
const ctx = canvas.getContext("2d");
let xpOrbs = [];
let isGameOpen = false;

function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
}
resizeCanvas();

class XpOrb {
    constructor(startX, startY, koin) {
        this.x = startX; this.y = startY;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 2;
        this.radius = Math.min(8, 3 + (koin * 0.5));
        this.alpha = 1; this.gravity = 0.15;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.alpha -= 0.015; }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        const warna = Math.random() > 0.5 ? "#55ff55" : "#ffff55";
        ctx.fillStyle = warna; ctx.shadowColor = warna; ctx.shadowBlur = 8;
        ctx.fill(); ctx.closePath(); ctx.restore();
    }
}

function urusAnimasiXp() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    xpOrbs = xpOrbs.filter(orb => orb.alpha > 0);
    xpOrbs.forEach(orb => { orb.update(); orb.draw(); });
    requestAnimationFrame(urusAnimasiXp);
}

function updateTimeGate() {
    const sekarang = new Date();
    let targetBuka = new Date(2026, 5, 20, 4, 0, 0); 
    
    while (sekarang >= new Date(targetBuka.getTime() + 5 * 60 * 1000)) {
        targetBuka.setDate(targetBuka.getDate() + 1);
    }
    const targetTutup = new Date(targetBuka.getTime() + 5 * 60 * 1000); 
    
    const lockScreen = document.getElementById("lock-screen");
    const statusText = document.getElementById("lock-status-text");
    const timerText = document.getElementById("countdown-timer");
    const bulbObj = document.getElementById("bulb-obj");

    if (sekarang < targetBuka) {
        isGameOpen = false;
        lockScreen.style.display = "flex";
        bulbObj.style.display = "none";
        statusText.innerText = "GAME DIBUKA DALAM:";
        statusText.style.color = "#94a3b8";
        let selisih = targetBuka - sekarang;
        timerText.innerText = formatSisaWaktu(selisih);
        timerText.style.color = "#f59e0b";
    } 
    else if (sekarang >= targetBuka && sekarang < targetTutup) {
        if (!isGameOpen && currentPlayer) {
            bulbObj.style.display = "flex";
            pindahBohlam();
        }
        isGameOpen = true;
        lockScreen.style.display = "flex"; 
        lockScreen.style.background = "rgba(0,0,0,0)";
        bulbObj.style.zIndex = "10"; 
        statusText.innerText = "SISA WAKTU MAIN GLOBAL:";
        statusText.style.color = "#ef4444";
        let selisih = targetTutup - sekarang;
        timerText.innerText = formatSisaWaktu(selisih);
        timerText.style.color = "#ef4444";
    }
}

function formatSisaWaktu(ms) {
    let totalDetik = Math.floor(ms / 1000);
    let jam = Math.floor(totalDetik / 3600);
    let menit = Math.floor((totalDetik % 3600) / 60);
    let detik = totalDetik % 60;
    return `${String(jam).padStart(2,'0')}:${String(menit).padStart(2,'0')}:${String(detik).padStart(2,'0')}`;
}

setInterval(updateTimeGate, 1000);

function playSound(type) {
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'success') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.setValueAtTime(1760, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }
}

db.ref("pool_global").on("value", (snapshot) => {
    let data = snapshot.val();
    if (data === null) {
        db.ref("pool_global").set(MAX_POOL); sisaPoinGlobal = MAX_POOL;
    } else { sisaPoinGlobal = data; }
    document.getElementById("global-pool").innerText = sisaPoinGlobal.toLocaleString('id-ID');
    if (sisaPoinGlobal <= 0) { document.getElementById("tamat-screen").style.display = "flex"; }
});

// LOGIKA VALIDASI TOKEN STRATEGIS
function startEvent() {
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    const tokenInput = document.getElementById("player-token").value.trim();
    
    if (!tokenInput) {
        alert("Token tidak boleh kosong!");
        return;
    }

    // Periksa ke database Firebase apakah token ini terdaftar
    db.ref("daftar_token/" + tokenInput).once("value").then((snapshot) => {
        const namaTerdeteksi = snapshot.val();
        
        if (namaTerdeteksi) {
            // JIKA TOKEN VALID, AMBIL NAMA ASLI MEREKA
            currentPlayer = namaTerdeteksi;
            
            document.getElementById("login-section").style.display = "none";
            document.getElementById("score-section").style.display = "flex";
            document.getElementById("display-player-name").innerText = "Poin " + currentPlayer;
            
            resizeCanvas();
            updateTimeGate();
            urusAnimasiXp();

            // Ambil data skor personal berdasarkan nama asli
            db.ref("peserta/" + currentPlayer).on("value", (snapshot) => {
                document.getElementById("my-coins").innerText = snapshot.val() || 0;
            });
        } else {
            // JIKA TOKEN PALSU
            alert("Token SALAH atau Tidak Terdaftar!");
        }
    });
}

function pindahBohlam() {
    if (!isGameOpen) return;
    const canvasArea = document.getElementById("canvas-area");
    const bulb = document.getElementById("bulb-obj");
    const maxX = canvasArea.clientWidth - 55;
    const maxY = canvasArea.clientHeight - 55;
    bulb.style.left = Math.floor(Math.random() * maxX) + "px";
    bulb.style.top = Math.floor(Math.random() * maxY) + "px";
    bulb.style.transform = "none";
}

function tapBohlam() {
    if (sisaPoinGlobal <= 0 || !currentPlayer || !isGameOpen) return;
    
    let koinDidapat = Math.floor(Math.random() * 10) + 1;
    if (koinDidapat > sisaPoinGlobal) { koinDidapat = sisaPoinGlobal; }

    if (koinDidapat > 0) {
        playSound('success');
        const bulb = document.getElementById("bulb-obj");
        const startX = bulb.offsetLeft + 27;
        const startY = bulb.offsetTop + 27;
        
        for (let i = 0; i < koinDidapat * 2; i++) {
            xpOrbs.push(new XpOrb(startX, startY, koinDidapat));
        }

        db.ref("pool_global").transaction((currentPool) => {
            return (currentPool || MAX_POOL) - koinDidapat;
        });

        db.ref("peserta/" + currentPlayer).transaction((currentPoin) => {
            return (currentPoin || 0) + koinDidapat;
        });

        pindahBohlam();
    }
}
</script>
</body>
</html>
