<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Perpisahan - XP Hunt Ultimate Fix</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }
        .container {
            background: #151f32;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #233554;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }
        
        /* AREA GAMEPLAY */
        .game-canvas-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            background-color: #05070c;
            background-image: url('koin-kaca.png');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            border: 1px solid #233554;
            overflow: hidden;
        }

        #xp-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        /* TARGET BOHLAM (CLICKER) */
        .target-bulb {
            position: absolute;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, rgba(245,158,11,0.3) 0%, rgba(245,158,11,0) 70%);
            border: 2px solid #f59e0b;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
            -webkit-tap-highlight-color: transparent;
            z-index: 10 !important;
        }
        .target-bulb::after {
            content: "";
            width: 20px; height: 20px;
            background-color: #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 10px #f59e0b;
        }

        /* OVERLAY LOCK SCREEN */
        .lock-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; border-radius: 12px;
        }

        .floating-timer {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px; border-radius: 6px;
            border: 1px solid #ef4444; font-family: monospace;
            font-size: 0.9rem; font-weight: bold; color: #ef4444;
            z-index: 30;
        }
        .timer-countdown {
            font-size: 1.8rem; color: #f59e0b; font-weight: bold;
            margin-top: 10px; font-family: monospace;
        }

        /* PESAN AMBANG / POP-UP ANNOUNCEMENT BY ADMIN (FIX DI ATAS GAME) */
        .admin-toast {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #38bdf8;
            padding: 12px 16px;
            border-radius: 10px;
            width: 85%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            z-index: 100 !important;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            opacity: 0;
            pointer-events: none;
        }
        .admin-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-msg { font-size: 0.95rem; color: #f1f5f9; font-weight: 500; line-height: 1.4; }
        .toast-by { font-size: 0.7rem; color: #38bdf8; font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* PANEL INFO DI BAWAH */
        .bottom-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: #0b0f19; padding: 12px; border-radius: 10px; border: 1px solid #233554;
        }
        .info-block { text-align: left; }
        .info-label { font-size: 0.75rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 1.4rem; font-weight: bold; }
        #global-pool { color: #f59e0b; }
        #my-coins { color: #10b981; }

        input[type="text"] {
            width: 100%; padding: 12px; border: 1px solid #233554;
            border-radius: 8px; background-color: #0b0f19; color: #fff;
            font-size: 1rem; text-align: center; box-sizing: border-box;
            outline: none; margin-bottom: 8px;
        }
        button {
            background-color: #f59e0b; color: #0b0f19; border: none; padding: 12px;
            font-size: 1rem; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
        }

        #tamat-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; color: #ffffff;
            display: none; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; z-index: 9999; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="tamat-screen">kuota habis, besok undian hadiah</div>

<div class="container">
    <div class="game-canvas-wrapper" id="canvas-area">
        <canvas id="xp-canvas"></canvas>
        
        <div class="target-bulb" id="bulb-obj" style="display: none;"></div>
        <div id="mini-timer" class="floating-timer" style="display: none;">00:00</div>
        
        <div id="popup-admin" class="admin-toast">
            <div id="popup-text" class="toast-msg">Mencoba memuat pesan...</div>
            <div class="toast-by">by Admin</div>
        </div>
        
        <div id="lock-screen" class="lock-overlay" style="display: none;">
            <div style="font-size: 1rem; color: #94a3b8; font-weight: bold;">GAME DIBUKA DALAM:</div>
            <div id="countdown-timer" class="timer-countdown">00:00:00</div>
        </div>
    </div>

    <div id="login-section">
        <input type="text" id="player-token" placeholder="Masukkan Token Anda">
        <button id="btn-login">MASUK GAME</button>
    </div>

    <div id="score-section" class="bottom-panel" style="display: none;">
        <div class="info-block">
            <div class="info-label">Sisa Kuota Poin</div>
            <div id="global-pool" class="info-value">50.000</div>
        </div>
        <div class="info-block" style="text-align: right;">
            <div id="display-player-name" class="info-label">Poin Anda</div>
            <div id="my-coins" class="info-value">0</div>
        </div>
    </div>

    <div id="voucher-section" class="bottom-panel" style="display: none; flex-direction: column; gap: 8px;">
        <div class="info-label" style="text-align: center;">Klaim Voucher Bonus</div>
        <div style="display: flex; gap: 8px; width: 100%;">
            <input type="text" id="voucher-input" placeholder="Masukkan Kode Voucher" style="margin-bottom: 0; flex: 1; text-transform: uppercase;">
            <button id="btn-claim-voucher" style="width: auto; padding: 0 20px;">KLAIM</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, runTransaction } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBQHBJJOaFQ8J27vz65dBoKtezmkVnGcNM",
        authDomain: "kakao-1cf8a.firebaseapp.com",
        databaseURL: "https://kakao-1cf8a-default-rtdb.firebaseio.com",
        projectId: "kakao-1cf8a",
        storageBucket: "kakao-1cf8a.firebasestorage.app",
        messagingSenderId: "610687296228",
        appId: "1:610687296228:web:0655f080b188dce2eb42f1",
        measurementId: "G-J2N0LKKFB2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentPlayer = "";
    let sisaPoinGlobal = 50000;
    const MAX_POOL = 50000;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const canvas = document.getElementById("xp-canvas");
    const ctx = canvas.getContext("2d");
    let xpOrbs = [];
    let isGameOpen = false;
    let dataPengumuman = null;
    let jadwalServer = null; // Variabel penampung jadwal server otomatis

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resizeCanvas();

    class XpOrb {
        constructor(startX, startY, koin) {
            this.x = startX; this.y = startY;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 3 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed - 2;
            this.radius = Math.min(8, 3 + (koin * 0.5));
            this.alpha = 1; this.gravity = 0.15;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.alpha -= 0.015; }
        draw() {
            ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            const warna = Math.random() > 0.5 ? "#55ff55" : "#ffff55";
            ctx.fillStyle = warna; ctx.shadowColor = warna; ctx.shadowBlur = 8;
            ctx.fill(); ctx.closePath(); ctx.restore();
        }
    }

    function urusAnimasiXp() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        xpOrbs = xpOrbs.filter(orb => orb.alpha > 0);
        xpOrbs.forEach(orb => { orb.update(); orb.draw(); });
        requestAnimationFrame(urusAnimasiXp);
    }

    // AMBIL DATA JADWAL SECARA REAL-TIME DARI FIREBASE (ANTI-HACK KODE)
    const jadwalRef = ref(db, "jadwal_game");
    onValue(jadwalRef, (snapshot) => {
        if (snapshot.exists()) {
            jadwalServer = snapshot.val();
        }
    });

function updateTimeGate() {
    const sekarang = new Date();
    
    // KUNCI JAM MULAI: Game otomatis buka tiap jam 04:00 Subuh tiap hari
    let targetBuka = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate(), 5, 55, 0); 
    
    // DURASI GAME: Set durasi berapa menit game boleh dimainin (misal: 5 menit)
    const durasiMenit = 5; 
    let targetTutup = new Date(targetBuka.getTime() + durasiMenit * 60 * 1000); 

    // LOGIKA AUTO-LOOP: Kalau sesi hari ini udah lewat, target otomatis maju ke subuh besok
    if (sekarang >= targetTutup) {
        targetBuka.setDate(targetBuka.getDate() + 1);
        targetTutup = new Date(targetBuka.getTime() + durasiMenit * 60 * 1000);
    }

    const lockScreen = document.getElementById("lock-screen");
    const timerTengah = document.getElementById("countdown-timer");
    const miniTimerKananAtas = document.getElementById("mini-timer");
    const bulbObj = document.getElementById("bulb-obj");
    const tamatScreen = document.getElementById("tamat-screen");

    // 1. CEK KUOTA POIN (Hanya kunci layar kalau poin Firebase beneran 0)
    if (sisaPoinGlobal <= 0) {
        isGameOpen = false;
        bulbObj.style.display = "none";
        miniTimerKananAtas.style.display = "none";
        tamatScreen.style.display = "flex";
        return; 
    } else {
        tamatScreen.style.display = "none"; // Buka kunci jika poin masih ada
    }

    // 2. LOGIKA FASE WAKTU GAME
    if (sekarang < targetBuka) {
        // FASE HITUNG MUNDUR (Belum jamnya atau sesi hari ini udah lewat dan nunggu besok)
        isGameOpen = false;
        lockScreen.style.display = "flex";
        miniTimerKananAtas.style.display = "none";
        bulbObj.style.display = "none";
        
        let selisih = targetBuka - sekarang;
        timerTengah.innerText = formatSisaWaktu(selisih);
    } 
    else if (sekarang >= targetBuka && sekarang < targetTutup) {
        // FASE GAMEPLAY BERJALAN (Bohlam muncul)
        lockScreen.style.display = "none";
        miniTimerKananAtas.style.display = "block";
        isGameOpen = true;
        
        if (currentPlayer && bulbObj.style.display === "none") {
            bulbObj.style.display = "flex";
            pindahBohlam();
        }
        let selisihAsli = targetTutup - sekarang;
        miniTimerKananAtas.innerText = "Sesi: " + formatSisaWaktuMenitDetik(selisihAsli);
    }
}


    function formatSisaWaktu(ms) {
        let totalDetik = Math.floor(ms / 1000);
        let jam = Math.floor(totalDetik / 3600);
        let menit = Math.floor((totalDetik % 3600) / 60);
        let detik = totalDetik % 60;
        return `${String(jam).padStart(2,'0')}:${String(menit).padStart(2,'0')}:${String(detik).padStart(2,'0')}`;
    }

    function formatSisaWaktuMenitDetik(ms) {
        let totalDetik = Math.floor(ms / 1000);
        let menit = Math.floor(totalDetik / 60);
        let detik = totalDetik % 60;
        return `${String(menit).padStart(2,'0')}:${String(detik).padStart(2,'0')}`;
    }

    setInterval(updateTimeGate, 1000);

    function playSound(type) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'success') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1760, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }
    }

// Sinkronisasi Pool Global (Versi Fix Anti-Lock Awal)
const poolRef = ref(db, "pool_global");
onValue(poolRef, (snapshot) => {
    let data = snapshot.val();
    if (data === null) { 
        sisaPoinGlobal = MAX_POOL; 
    } else { 
        sisaPoinGlobal = Number(data); // Mastiin dibaca sebagai angka
    }
    
    document.getElementById("global-pool").innerText = sisaPoinGlobal.toLocaleString('id-ID');
    
    // Hanya kunci layar kalau data emang beneran habis (0), bukan pas baru loading
    if (data !== null && sisaPoinGlobal <= 0) { 
        document.getElementById("tamat-screen").style.display = "flex"; 
    } else {
        document.getElementById("tamat-screen").style.display = "none"; // Buka kunci kalau poin masih ada
    }
});

    // AMBIL DATA PENGUMUMAN SECARA REALTIME DARI FIREBASE
    const pengumumanRef = ref(db, "pengumuman");
    onValue(pengumumanRef, (snapshot) => {
        if (snapshot.exists()) {
            dataPengumuman = snapshot.val();
        }
    });

    function inisialisasiPemain(namaPemain) {
        currentPlayer = namaPemain;
        document.getElementById("login-section").style.display = "none";
        document.getElementById("score-section").style.display = "flex";
        document.getElementById("voucher-section").style.display = "flex"; // Fix Typo Double Style
        document.getElementById("display-player-name").innerText = "Poin " + currentPlayer;
        resizeCanvas();
        updateTimeGate();
        urusAnimasiXp();

        const pesertaRef = ref(db, "peserta/" + currentPlayer);
        onValue(pesertaRef, (snapshot) => {
            document.getElementById("my-coins").innerText = snapshot.val() || 0;
        });
    }

    // Auto-Login Check
    const tokenTersimpan = localStorage.getItem("xp_game_token");
    if (tokenTersimpan) {
        const autoTokenRef = ref(db, "daftar_token/" + tokenTersimpan);
        get(autoTokenRef).then((snapshot) => {
            if (snapshot.exists()) { inisialisasiPemain(snapshot.val()); } 
            else { localStorage.removeItem("xp_game_token"); }
        });
    }

    // Login Manual
    document.getElementById("btn-login").onclick = function() {
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        const tokenInput = document.getElementById("player-token").value.trim();
        if (!tokenInput) { alert("Token tidak boleh kosong!"); return; }

        const tokenRef = ref(db, "daftar_token/" + tokenInput);
        get(tokenRef).then((snapshot) => {
            const namaTerdeteksi = snapshot.val();
            if (namaTerdeteksi) {
                localStorage.setItem("xp_game_token", tokenInput);
                inisialisasiPemain(namaTerdeteksi);
            } else { alert("Token SALAH!"); }
        }).catch(() => { alert("Error database!"); });
    };

    function pindahBohlam() {
        if (!isGameOpen || !currentPlayer) return;
        const canvasArea = document.getElementById("canvas-area");
        const bulb = document.getElementById("bulb-obj");
        const maxX = canvasArea.clientWidth - 55;
        const maxY = canvasArea.clientHeight - 55;
        bulb.style.left = Math.floor(Math.random() * maxX) + "px";
        bulb.style.top = Math.floor(Math.random() * maxY) + "px";
    }

    document.getElementById("bulb-obj").onclick = function() {
        if (sisaPoinGlobal <= 0 || !currentPlayer || !isGameOpen) return;
        let koinDidapat = Math.floor(Math.random() * 10) + 1;
        if (koinDidapat > sisaPoinGlobal) { koinDidapat = sisaPoinGlobal; }

        if (koinDidapat > 0) {
            playSound('success');
            const bulb = document.getElementById("bulb-obj");
            const startX = bulb.offsetLeft + 27; const startY = bulb.offsetTop + 27;
            for (let i = 0; i < koinDidapat * 2; i++) { xpOrbs.push(new XpOrb(startX, startY, koinDidapat)); }

            runTransaction(poolRef, (currentPool) => {
                if (currentPool === null) currentPool = MAX_POOL;
                return currentPool - koinDidapat;
            });

            const myRef = ref(db, "peserta/" + currentPlayer);
            runTransaction(myRef, (currentPoin) => { return (currentPoin || 0) + koinDidapat; });
            pindahBohlam();
        }
    };

    // Logika Klaim Kode Voucher
    document.getElementById("btn-claim-voucher").onclick = function() {
        if (!currentPlayer) return;
        
        const kodeInput = document.getElementById("voucher-input").value.trim().toUpperCase();
        if (!kodeInput) { alert("Isi dulu kode vouchernya, Bre!"); return; }

        const riwayatRef = ref(db, `peserta/${currentPlayer}/voucher_terklaim/${kodeInput}`);
        
        get(riwayatRef).then((riwayatSnapshot) => {
            if (riwayatSnapshot.exists()) {
                alert("Voucher ini sudah pernah lu klaim, Cok! Jangan maruk 😡");
                return;
            }

            const voucherRef = ref(db, "vouchers/" + kodeInput);
            get(voucherRef).then((snapshot) => {
                if (!snapshot.exists()) {
                    alert("Kode voucher SALAH atau tidak terdaftar! ❌");
                    return;
                }

                const dataVoucher = snapshot.val();
                const sekarang = new Date();

                const waktuRilis = new Date(dataVoucher.tahun, dataVoucher.bulan - 1, dataVoucher.tanggal, dataVoucher.jam, dataVoucher.menit, 0);
                const waktuKadaluwarsa = new Date(waktuRilis.getTime() + (dataVoucher.durasi_aktif_menit * 60 * 1000));

                if (sekarang < waktuRilis) {
                    alert("Sabar, Bre! Voucher ini belum rilis resmi. Masih disegel server! ⏳");
                    return;
                }
                
                if (sekarang >= waktuKadaluwarsa) {
                    alert("Yah telat! Vouchernya udah HANGUS / Kadaluwarsa 😭⏰");
                    return;
                }

                const bonus = dataVoucher.bonus_poin;
                const myScoreRef = ref(db, "peserta/" + currentPlayer);
                
                runTransaction(myScoreRef, (currentData) => {
                    let poinSekarang = 0;
                    if (typeof currentData === 'number') {
                        poinSekarang = currentData;
                    } else if (currentData && currentData.poin) {
                        poinSekarang = currentData.poin;
                    }
                    return poinSekarang + bonus;
                }).then(() => {
                    const logKlaimRef = ref(db, `peserta/${currentPlayer}/voucher_terklaim/${kodeInput}`);
                    runTransaction(logKlaimRef, () => { return true; });

                    alert(`🎉 MANTAP! Sukses klaim voucher, +${bonus} Poin masuk rekening lu!`);
                    document.getElementById("voucher-input").value = "";
                }).catch((err) => {
                    alert("Gagal memproses voucher. Error database!");
                    console.error(err);
                });
            });
        });
    };
</script>
</body>
</html>
