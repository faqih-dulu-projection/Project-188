<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké Collect - Arena Perang Quick Scope</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }
        #setup-screen, #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .btn {
            background: #ff5722;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background: #e64a19; }
        .btn-back { background: #555; margin-top: 20px; }
        .btn-back:hover { background: #444; }
        
        /* HP Bar Arena */
        .arena-status {
            display: flex;
            justify-content: space-around;
            width: 80%;
            margin-bottom: 20px;
            position: absolute;
            top: 20px;
        }
        .player-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            width: 40%;
            border: 2px solid #333;
        }
        .hp-bar {
            background: #444;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .hp-fill {
            background: #4caf50;
            height: 100%;
            width: 100%;
            transition: width 0.1s ease-in-out;
        }

        /* Target Quick Scope */
        #target-btn {
            position: absolute;
            background: #e53935;
            color: white;
            border: 3px solid #fff;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 15px #e53935;
            display: none;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        #target-btn:active { transform: scale(0.9); }
        #status-msg { font-size: 24px; font-weight: bold; color: #ffeb3b; margin-top: 50px;}
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2>Selamat Datang di Arena Quick Scope!</h2>
        <p>Pilih peran lu buat tanding langsung tanpa ribet input kode:</p>
        <div style="margin-bottom: 15px;">
            <button class="btn" style="background:#2196f3;" onclick="pilihRole('Player1')">Join sebagai Player 1</button>
            <button class="btn" style="background:#e91e63;" onclick="pilihRole('Player2')">Join sebagai Player 2</button>
        </div>
        <button class="btn btn-back" onclick="kembaliKeUtama()">⬅ Kembali ke Poké Collect</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="arena-status">
            <div class="player-box" id="box-p1">
                <h3>Player 1</h3>
                <div class="hp-bar"><div id="hp-p1" class="hp-fill"></div></div>
            </div>
            <div class="player-box" id="box-p2">
                <h3>Player 2</h3>
                <div class="hp-bar"><div id="hp-p2" class="hp-fill"></div></div>
            </div>
        </div>

        <div id="status-msg">Menunggu Pemain Lain...</div>
        
        <button id="target-btn" onclick="tembakMusuh()">HIT!</button>
    </div>

    <script>
        // Konfigurasi Firebase langsung pakai URL lu, Bray
        const firebaseConfig = {
            databaseURL: "https://multiplayer-5e98b-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomRef = db.ref("quick_scope_room");

        let myRole = ""; 
        let gameAktif = false;

        // Fungsi kembali ke index.html (Poké Collect biasa)
        function kembaliKeUtama() {
            window.location.href = "index.html"; 
        }

        // Memilih Role & Reset room kalau masuk awal
        function pilihRole(role) {
            myRole = role;
            document.getElementById("setup-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";
            
            // Tandai di Firebase kalau role ini sudah terisi
            roomRef.child(role).set(true);

            // Jika pilih Player 1, sekalian reset darah game ke 100 global
            if (role === "Player1") {
                roomRef.child("status").set({
                    p1_hp: 100,
                    p2_hp: 100,
                    targetX: 50,
                    targetY: 50,
                    spawnTime: 0
                });
            }
            mulaiMendengarkanDatabase();
        }

        // Sinkronisasi data real-time Firebase
        function mulaiMendengarkanDatabase() {
            roomRef.on("value", (snapshot) => {
                const data = snapshot.val();
                if (!data || !data.status) return;

                const status = data.status;
                
                // Update tampilan darah (HP)
                document.getElementById("hp-p1").style.width = status.p1_hp + "%";
                document.getElementById("hp-p2").style.width = status.p2_hp + "%";

                // Cek status game apakah player 1 & 2 udah ready
                if (data.Player1 && data.Player2 && status.p1_hp > 0 && status.p2_hp > 0) {
                    gameAktif = true;
                    document.getElementById("status-msg").innerText = "TEMBAK TARGETNYA BRAY!";
                    
                    // Posisikan tombol target sesuai koordinat di Firebase
                    const targetBtn = document.getElementById("target-btn");
                    targetBtn.style.display = "flex";
                    targetBtn.style.left = status.targetX + "vw";
                    targetBtn.style.top = status.targetY + "vh";
                } else if (status.p1_hp <= 0 || status.p2_hp <= 0) {
                    gameAktif = false;
                    document.getElementById("target-btn").style.display = "none";
                    if (status.p1_hp <= 0) {
                        document.getElementById("status-msg").innerText = "PLAYER 2 MENANG! 🎉";
                    } else {
                        document.getElementById("status-msg").innerText = "PLAYER 1 MENANG! 🎉";
                    }
                }
            });
        }

        // Aksi ketika berhasil nembak/klik tombol target
        function tembakMusuh() {
            if (!gameAktif) return;

            roomRef.child("status").get().then((snapshot) => {
                if (snapshot.exists()) {
                    const status = snapshot.val();
                    let p1_hp = status.p1_hp;
                    let p2_hp = status.p2_hp;

                    // Kurangi darah lawan berdasarkan siapa yang ngeklik duluan
                    if (myRole === "Player1") {
                        p2_hp -= 10; // Kurangi darah Player 2
                    } else if (myRole === "Player2") {
                        p1_hp -= 10; // Kurangi darah Player 1
                    }

                    // Acak posisi baru buat target berikutnya (biar gak muncul di luar layar, dibatasin 10-80%)
                    const xAcak = Math.floor(Math.random() * 70) + 10;
                    const yAcak = Math.floor(Math.random() * 60) + 20;

                    // Update balik ke Firebase
                    roomRef.child("status").update({
                        p1_hp: Math.max(0, p1_hp),
                        p2_hp: Math.max(0, p2_hp),
                        targetX: xAcak,
                        targetY: yAcak,
                        spawnTime: Date.now()
                    });
                }
            });
        }

        // Reset room otomatis kalau tab ditutup biar gak ngegantung
        window.addEventListener("beforeunload", function () {
            if (myRole) {
                roomRef.child(myRole).remove();
            }
        });
    </script>
</body>
                                                                              </html>
