<!DOCTYPE html>
<html lang="id">
<head>

    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; 
        }

        body.ingame {
            overflow: hidden;
            height: 100vh;
        }

        .screen {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
            margin-top: 2vh;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2, h3 { margin: 0 0 12px 0; font-weight: 600; }
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
        }
        input:focus { outline: 1px solid var(--primary); }
        button {
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        .btn-back { background: #475569; margin-top: 5px; }

        /* Loadout / Item Selector */
        .loadout-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .item-card {
            background: #1e293b;
            border: 1px solid #475569;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        .item-card.selected {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        /* Room List */
        .room-container {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .room-item {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
        .room-info { text-align: left; }
        .room-name { font-weight: bold; font-size: 14px; }
        .room-status { font-size: 11px; color: var(--text-muted); }
        .btn-join { width: auto; padding: 6px 12px; margin: 0; font-size: 13px; }

        /* Game Screen */
        #game-screen { display: none; width: 100%; height: 100vh; position: relative; }
        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        .player-card {
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 10px;
            width: 48%;
            text-align: center;
            border: 1px solid #334155;
        }
        .hp-bar-bg { background: #334155; height: 16px; border-radius: 8px; margin-top: 8px; overflow: hidden; }
        .hp-fill { background: var(--success); height: 100%; width: 100%; transition: width 0.1s linear; }
        #status-msg {
            position: absolute;
            top: 130px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #facc15;
        }
        
        #arena-actions {
            position: absolute;
            top: 185px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
        }
        .btn-exit-arena {
            width: auto;
            background: var(--danger);
            padding: 8px 16px;
            font-size: 14px;
        }

        #target-btn {
            position: absolute;
            background: var(--danger);
            color: white;
            border: 3px solid #fff;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--danger);
            display: none;
            align-items: center;
            justify-content: center;
            user-select: none;
            transform: translate(-50%, -50%);
        }

        /* FITUR BARU: Style untuk Toast Notification Chat Global di Arena */
        #gameMentionToast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            color: #e0e7ff;
            padding: 14px 28px;
            border-radius: 10px;
            border: 2px solid #4f46e5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 15px rgba(79, 70, 229, 0.4);
            z-index: 999999;
            display: none;
            font-family: 'Segoe UI', sans-serif;
            min-width: 300px;
            animation: gameSlideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        @keyframes gameSlideDown {
            from { top: -80px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
    </style>
</head>
