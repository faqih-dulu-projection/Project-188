<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké Collect - Arena</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; 
        }

        body.ingame {
            overflow: hidden;
            height: 100vh;
        }

        .screen {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
            margin-top: 2vh;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2, h3 { margin: 0 0 12px 0; font-weight: 600; }
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
        }
        input:focus { outline: 1px solid var(--primary); }
        button {
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        .btn-back { background: #475569; margin-top: 5px; }

        /* Loadout / Item Selector */
        .loadout-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .item-card {
            background: #1e293b;
            border: 1px solid #475569;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        .item-card.selected {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        /* Room List */
        .room-container {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .room-item {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
        .room-info { text-align: left; }
        .room-name { font-weight: bold; font-size: 14px; }
        .room-status { font-size: 11px; color: var(--text-muted); }
        .btn-join { width: auto; padding: 6px 12px; margin: 0; font-size: 13px; }

        /* Game Screen */
        #game-screen { display: none; width: 100%; height: 100vh; position: relative; }
        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        .player-card {
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 10px;
            width: 48%;
            text-align: center;
            border: 1px solid #334155;
        }
        .hp-bar-bg { background: #334155; height: 16px; border-radius: 8px; margin-top: 8px; overflow: hidden; }
        .hp-fill { background: var(--success); height: 100%; width: 100%; transition: width 0.1s linear; }
        #status-msg {
            position: absolute;
            top: 130px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #facc15;
        }
        
        #arena-actions {
            position: absolute;
            top: 185px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
        }
        .btn-exit-arena {
            width: auto;
            background: var(--danger);
            padding: 8px 16px;
            font-size: 14px;
        }

        #target-btn {
            position: absolute;
            background: var(--danger);
            color: white;
            border: 3px solid #fff;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--danger);
            display: none;
            align-items: center;
            justify-content: center;
            user-select: none;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="panel">
            <h2>Verifikasi Akun Poké Collect</h2>
            <input type="text" id="input-username" placeholder="Masukkan Username Anda">
            <button onclick="verifikasiPemain()">Masuk ke Lobi</button>
        </div>
        <button class="btn-back" onclick="keluarKeGameUtama()">Kembali ke Game</button>
    </div>

    <div id="lobby-screen" class="screen" style="display: none;">
        <div class="panel">
            <h3>Pilih Amunisi Bertarung (Maksimal 3)</h3>
            <div class="loadout-grid" id="loadout-list">
                </div>
        </div>

        <div class="panel">
            <h3>Buat Room</h3>
            <input type="text" id="input-room-name" placeholder="Nama Room">
            <input type="password" id="input-room-pass" placeholder="Kata Sandi (Kosongkan jika publik)">
            <button onclick="buatRoom()">Buat & Masuk</button>
        </div>

        <div class="panel">
            <h3>Daftar Room Tersedia</h3>
            <div class="room-container" id="room-list-container">
                <div style="text-align:center; color:#94a3b8;">Memuat daftar room...</div>
            </div>
        </div>
        <button class="btn-back" onclick="keluarKeGameUtama()">Kembali ke Menu Utama</button>
    </div>

    <div id="game-screen">
        <div class="hud">
            <div class="player-card">
                <div id="txt-p1-name">Player 1</div>
                <div class="hp-bar-bg"><div id="hp-p1" class="hp-fill"></div></div>
            </div>
            <div class="player-card">
                <div id="txt-p2-name">Player 2</div>
                <div class="hp-bar-bg"><div id="hp-p2" class="hp-fill"></div></div>
            </div>
        </div>
        <div id="status-msg">Menyiapkan pertandingan...</div>
        
        <div id="arena-actions">
            <button id="btn-emergency-exit" class="btn-exit-arena" onclick="kembaliKeLobby('Anda meninggalkan arena pertarungan.')">Keluar Ke Lobi</button>
        </div>

        <button id="target-btn" onclick="tembak()">HIT</button>
    </div>

            { id: 807, name: "Singularitas Void", rarity: "impossible" },
            { id: 808, name: "Radiasi Hawking", rarity: "impossible" },
            { id: 809, name: "Quasar Energi", rarity: "impossible" },

        let username = "";
        let ownedItems = [];
        let selectedLoadout = [];
        let currentRoomId = null;
        let myRole = null;
        let gameActive = false;
        let roomListener = null;
        let countdownInterval = null;

        let totalMyHp = 100;
        let totalMyDmg = 10;
        let currentActiveRoomsData = {};

        if(localStorage.getItem("poke_username")) {
            document.getElementById("input-username").value = localStorage.getItem("poke_username");
        }

        function verifikasiPemain() {
            username = document.getElementById("input-username").value.trim().replace(/[^a-zA-Z0-9]/g, "");
            if (!username) return alert("Username valid diperlukan.");

            db.ref("players/" + username + "/inventory").once("value").then((snapshot) => {
                const cloudInv = snapshot.val() || {};
                
                // FIXED: Mencocokkan data Firebase dengan 100 item baru
                ownedItems = ITEMS_REF.filter(item => cloudInv[item.id] >= 1);

                document.getElementById("login-screen").style.display = "none";
                document.getElementById("lobby-screen").style.display = "flex";

                renderLoadoutSelector();
                aktifkanLobbyListener();
            });
        }

        function renderLoadoutSelector() {
            const container = document.getElementById("loadout-list");
            container.innerHTML = "";

            if (ownedItems.length === 0) {
                container.innerHTML = "<div style='color:#94a3b8; grid-column: span 2; padding: 10px;'>Gacha di game utama dulu untuk membuka item!</div>";
                return;
            }

            ownedItems.forEach(item => {
                const card = document.createElement("div");
                card.className = "item-card";
                card.innerText = `${item.name}\n(${item.rarity.toUpperCase()})`;
                card.onclick = () => toggleSelectItem(item, card);
                container.appendChild(card);
            });
        }

        function toggleSelectItem(item, element) {
            const idx = selectedLoadout.findIndex(i => i.id === item.id);
            if (idx > -1) {
                selectedLoadout.splice(idx, 1);
                element.classList.remove("selected");
            } else {
                if (selectedLoadout.length >= 3) return alert("Maksimal memilih 3 item!");
                selectedLoadout.push(item);
                element.classList.add("selected");
            }

            totalMyHp = 100;
            totalMyDmg = 10;
            selectedLoadout.forEach(i => {
                const stat = rarityStats[i.rarity] || { hp: 0, dmg: 0 };
                totalMyHp += stat.hp;
                totalMyDmg += stat.dmg;
            });
        }

        function aktifkanLobbyListener() {
            roomsRef.on("value", (snapshot) => {
                if (currentRoomId) return;
                const container = document.getElementById("room-list-container");
                container.innerHTML = "";
                currentActiveRoomsData = snapshot.val() || {};

                if (Object.keys(currentActiveRoomsData).length === 0) {
                    container.innerHTML = "<div style='text-align:center; color:#94a3b8;'>Tidak ada room aktif. Silakan buat baru!</div>";
                    return;
                }

                for (let id in currentActiveRoomsData) {
                    const room = currentActiveRoomsData[id];
                    if (room.p1 && room.p2) continue;

                    const hasPass = room.password && room.password.trim() !== "";
                    const lockTxt = hasPass ? "🔒 Kunci" : "🌍 Publik";

                    container.innerHTML += `
                        <div class="room-item">
                            <div class="room-info">
                                <span class="room-name">${room.name}</span>
                                <span class="room-status">${lockTxt} - Host: ${room.p1_name}</span>
                            </div>
                            <button class="btn-join" data-id="${id}" onclick="persiapanJoinRoom(this)">Join</button>
                        </div>
                    `;
                }
            });
        }

        function persiapanJoinRoom(btnElement) {
            const id = btnElement.getAttribute("data-id");
            const room = currentActiveRoomsData[id];
            if(!room) return;

            const hasPass = room.password && room.password.trim() !== "";
            joinRoom(id, hasPass, room.password);
        }

        function buatRoom() {
            let roomName = document.getElementById("input-room-name").value.trim() || username + "-Room";
            let roomPass = document.getElementById("input-room-pass").value;

            const newRoomRef = roomsRef.push();
            currentRoomId = newRoomRef.key;
            myRole = "p1";

            newRoomRef.set({
                name: roomName,
                password: roomPass,
                p1: true, p2: false,
                p1_name: username, p2_name: "Menunggu...",
                max_p1_hp: totalMyHp, max_p2_hp: 100,
                status: { p1_hp: totalMyHp, p2_hp: 100, targetX: 50, targetY: 50 }
            });
            masukArena();
        }

        function joinRoom(id, hasPass, actualPass) {
            if (hasPass) {
                let check = prompt("Masukkan kata sandi room:");
                if (check !== actualPass) return alert("Kata sandi salah!");
            }
            currentRoomId = id;
            myRole = "p2";

            roomsRef.child(currentRoomId).update({
                p2: true,
                p2_name: username,
                max_p2_hp: totalMyHp,
                "status/p2_hp": totalMyHp
            });
            masukArena();
        }

        function masukArena() {
            document.body.classList.add("ingame");
            document.getElementById("lobby-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "block";
            document.getElementById("btn-emergency-exit").style.display = "block"; 
            mulaiSyncPertandingan();
        }

        function mulaiSyncPertandingan() {
            const currentRoomRef = roomsRef.child(currentRoomId);
            
            if (myRole === "p1") {
                let sisaWaktu = 60;
                clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    if (gameActive) {
                        clearInterval(countdownInterval);
                        return;
                    }
                    sisaWaktu--;
                    document.getElementById("status-msg").innerText = `Menunggu lawan bergabung... (${sisaWaktu}s)`;
                    
                    if (sisaWaktu <= 0) {
                        clearInterval(countdownInterval);
                        currentRoomRef.remove();
                        kembaliKeLobby("Batas waktu habis. Room dihapus karena tidak ada lawan yang bergabung.");
                    }
                }, 1000);
            }

            roomListener = currentRoomRef.on("value", (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    clearInterval(countdownInterval);
                    kembaliKeLobby("Room telah ditutup atau dibubarkan.");
                    return;
                }

                const status = data.status;
                document.getElementById("txt-p1-name").innerText = data.p1_name;
                document.getElementById("txt-p2-name").innerText = data.p2_name;

                document.getElementById("hp-p1").style.width = ((status.p1_hp / data.max_p1_hp) * 100) + "%";
                document.getElementById("hp-p2").style.width = ((status.p2_hp / data.max_p2_hp) * 100) + "%";

                if (data.p1 && data.p2 && status.p1_hp > 0 && status.p2_hp > 0) {
                    gameActive = true;
                    clearInterval(countdownInterval); 
                    
                    document.getElementById("status-msg").innerText = "";
                    document.getElementById("btn-emergency-exit").style.display = "none"; 
                    
                    const btn = document.getElementById("target-btn");
                    btn.style.display = "flex";
                    btn.style.left = status.targetX + "vw";
                    btn.style.top = status.targetY + "vh";
                } else if (status.p1_hp <= 0 || status.p2_hp <= 0) {
                    gameActive = false;
                    document.getElementById("target-btn").style.display = "none";
                    document.getElementById("status-msg").innerText = (status.p1_hp <= 0) ? `${data.p2_name} MENANG!` : `${data.p1_name} MENANG!`;

                    setTimeout(() => { if (myRole === "p1") currentRoomRef.remove(); }, 3000);
                }
            });
        }

        function tembak() {
            if (!gameActive) return;
            const statusRef = roomsRef.child(currentRoomId).child("status");

            statusRef.get().then((snapshot) => {
                if (!snapshot.exists()) return;
                let status = snapshot.val();

                if (myRole === "p1") status.p2_hp = Math.max(0, status.p2_hp - totalMyDmg);
                if (myRole === "p2") status.p1_hp = Math.max(0, status.p1_hp - totalMyDmg);

                status.targetX = Math.floor(Math.random() * 70) + 15;
                status.targetY = Math.floor(Math.random() * 55) + 25;
                statusRef.update(status);
            });
        }

        function kembaliKeLobby(msg) {
            clearInterval(countdownInterval);
            
            if (currentRoomId) {
                if (myRole === "p1") {
                    roomsRef.child(currentRoomId).remove();
                } else if (myRole === "p2") {
                    roomsRef.child(currentRoomId).update({ p2: false, p2_name: "Menunggu..." });
                }
            }

            if(roomListener) { roomsRef.child(currentRoomId).off("value", roomListener); roomListener = null; }
            
            gameActive = false; 
            currentRoomId = null; 
            myRole = null;
            
            document.body.classList.remove("ingame");
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("lobby-screen").style.display = "flex";
            if (msg) alert(msg);
        }

        function keluarKeGameUtama() {
            if (currentRoomId) {
                if (myRole === "p1") roomsRef.child(currentRoomId).remove();
            }
            window.location.href = 'index.html';
        }

        window.addEventListener("beforeunload", () => {
            if (currentRoomId) {
                if (myRole === "p1") roomsRef.child(currentRoomId).remove();
                else roomsRef.child(currentRoomId).update({ p2: false, p2_name: "Menunggu..." });
            }
        });
    </script>
</body>
</html>
